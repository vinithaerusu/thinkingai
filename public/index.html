<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ThinkingAI</title>
  <link rel="stylesheet" href="/style.css">
</head>
<body>
  <header>
    <h1>ThinkingAI</h1>
    <p class="tagline">figure things out</p>
  </header>
  <div id="chat">
    <div id="welcome">
      <p>What do you want to understand?</p>
    </div>
  </div>
  <div id="input-area">
    <textarea id="user-input" placeholder="Ask anything you want to figure out..." rows="1"></textarea>
    <button id="send-btn">Send</button>
  </div>
  <p class="privacy-note">Conversations may be logged to improve the experience.</p>
  <script src="/app.js"></script>
</body>
</html>
