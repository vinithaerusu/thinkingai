<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Aux</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/style.css">
</head>
<body>
  <header>
    <div class="header-left">
      <button id="sidebar-toggle" title="Conversation history">
        <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
          <rect x="2" y="3" width="14" height="1.5" rx="0.75" fill="currentColor"/>
          <rect x="2" y="8.25" width="14" height="1.5" rx="0.75" fill="currentColor"/>
          <rect x="2" y="13.5" width="14" height="1.5" rx="0.75" fill="currentColor"/>
        </svg>
      </button>
      <div class="logo">
        <svg class="logo-icon" width="24" height="24" viewBox="0 0 24 24" fill="none">
          <circle cx="12" cy="6" r="3" stroke="#7c9885" stroke-width="1.5"/>
          <circle cx="5" cy="19" r="2.5" stroke="#7c9885" stroke-width="1.5"/>
          <circle cx="19" cy="19" r="2.5" stroke="#7c9885" stroke-width="1.5"/>
          <circle cx="12" cy="19" r="2.5" fill="#7c9885" opacity="0.3" stroke="#7c9885" stroke-width="1.5"/>
          <line x1="12" y1="9" x2="5" y2="16.5" stroke="#2a2a2a" stroke-width="1.5"/>
          <line x1="12" y1="9" x2="12" y2="16.5" stroke="#4a5e50" stroke-width="1.5"/>
          <line x1="12" y1="9" x2="19" y2="16.5" stroke="#2a2a2a" stroke-width="1.5"/>
        </svg>
        <h1>Aux</h1>
      </div>
    </div>
    <div class="header-right">
      <button id="map-toggle" class="hidden">Map</button>
    </div>
  </header>

  <div class="app-body">
  <div id="sidebar">
    <div id="sidebar-header">
      <span>History</span>
      <button id="new-chat-btn" title="New conversation">+ New</button>
    </div>
    <div id="sidebar-search">
      <input id="sidebar-search-input" type="text" placeholder="Search conversations..." />
    </div>
    <div id="sidebar-list"></div>
    <div id="sidebar-footer">
      <button id="my-knowledge-btn" title="View all learned concepts">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
          <circle cx="8" cy="8" r="6.5" stroke="currentColor" stroke-width="1.5"/>
          <path d="M5 8.5L7 10.5L11 6" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        My Knowledge
      </button>
    </div>
  </div>

  <!-- My Knowledge overlay -->
  <div id="knowledge-overlay" class="hidden">
    <div id="knowledge-overlay-header">
      <span>My Knowledge</span>
      <button id="knowledge-overlay-close">&times;</button>
    </div>
    <div id="knowledge-overlay-tabs">
      <button class="overlay-tab active" data-tab="overview">Overview</button>
      <button class="overlay-tab" data-tab="topics">Topics</button>
      <button class="overlay-tab" data-tab="timeline">Timeline</button>
    </div>
    <div id="knowledge-overlay-content"></div>
  </div>

  <div id="main">
    <div id="chat-column">
      <div id="chat">
        <!-- Welcome screen rendered by app.js -->
      </div>

      <div id="input-area">
        <div id="input-wrap">
          <textarea id="input" rows="1" placeholder="What do you want to figure out?" autofocus></textarea>
          <button id="send">Send</button>
        </div>
      </div>

      <p class="disclaimer">Conversations are used to improve the experience. No personal data is collected.</p>
    </div>

    <div id="map-panel" class="hidden">
      <div id="map-header">
        <span>Knowledge Map</span>
        <div id="map-header-actions">
          <button id="map-expand" title="Expand">&#x26F6;</button>
          <button id="map-close">&times;</button>
        </div>
      </div>
      <div id="map-container">
        <svg id="map-svg"></svg>
      </div>
    </div>
  </div>

  </div><!-- .app-body -->

  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.min.js"></script>
  <script>mermaid.initialize({ startOnLoad: false, theme: 'dark' });</script>
  <script src="/app.js"></script>
</body>
</html>
