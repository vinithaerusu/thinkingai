<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Aux</title>
  <link rel="stylesheet" href="/style.css">
</head>
<body>
  <header>
    <h1>Aux</h1>
    <span class="tag">figure things out</span>
  </header>

  <div id="main">
    <div id="chat">
      <div class="welcome">
        <h2>Learn anything</h2>
        <p>I show you the right examples and let you find the pattern yourself. It sticks better than being told. Just type what you want to understand.</p>
      </div>
    </div>

    <div id="map-panel" class="hidden">
      <div id="map-header">
        <span>Knowledge Map</span>
        <div id="map-header-actions">
          <button id="map-expand" title="Expand">&#x26F6;</button>
          <button id="map-close">&times;</button>
        </div>
      </div>
      <div id="map-container">
        <svg id="map-svg"></svg>
      </div>
    </div>
  </div>

  <button id="map-toggle" class="hidden">Map</button>

  <div id="input-area">
    <div id="input-wrap">
      <textarea id="input" rows="1" placeholder="What do you want to figure out?" autofocus></textarea>
      <button id="send">Send</button>
    </div>
  </div>

  <p class="disclaimer">Conversations are used to improve the experience. No personal data is collected.</p>

  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.min.js"></script>
  <script>mermaid.initialize({ startOnLoad: false, theme: 'dark' });</script>
  <script src="/app.js"></script>
</body>
</html>
