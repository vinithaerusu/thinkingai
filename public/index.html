<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ThinkingAI</title>
  <link rel="stylesheet" href="/style.css">
</head>
<body>
  <header>
    <h1>ThinkingAI</h1>
    <span class="tag">figure things out</span>
  </header>

  <div id="chat">
    <div class="welcome">
      <h2>Figure anything out</h2>
      <p>I show you the right examples and let you find the pattern yourself. It sticks better than being told. Just type what you want to understand.</p>
    </div>
  </div>

  <div id="input-area">
    <div id="input-wrap">
      <textarea id="input" rows="1" placeholder="What do you want to figure out?" autofocus></textarea>
      <button id="send">Send</button>
    </div>
  </div>

  <script src="/app.js"></script>
</body>
</html>
